name: Install Ubuntu dependencies
description: Installs dependencies required to compile the template in Ubuntu

runs:
  using: "composite"
  steps:
    - name: Rust compilation prerequisites (Ubuntu)
      run: |
        sudo apt update
        sudo apt install -y clang libssl-dev llvm libclang-dev libudev-dev make protobuf-compiler
        rustup target add wasm32v1-none
        rustup component add rustfmt clippy rust-src
        cargo install cargo-expand
      shell: bash
