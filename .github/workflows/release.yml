name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches node version
        id: check
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version=$(grep -m1 '^version' node/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag=$tag node/Cargo.toml version=$version"
          if [ "$tag" != "$version" ]; then
            echo "::error::Tag '$tag' does not match node/Cargo.toml version '$version'"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  test:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/free-disk-space
      - uses: ./.github/actions/ubuntu-dependencies
      - name: Run tests
        run: SKIP_WASM_BUILD=1 cargo test --workspace --locked
        timeout-minutes: 30

  build-zombienet:
    needs: check-version
    runs-on: ubuntu-latest
    outputs:
      scenarios: ${{ steps.list.outputs.scenarios }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/free-disk-space
      - uses: ./.github/actions/ubuntu-dependencies
      - name: Build node
        run: bash zombienet/integration/scripts/build-node.sh
        timeout-minutes: 60
      - name: List scenarios
        id: list
        run: |
          json=$(cd zombienet/integration && find scenarios -name '*.zndsl' | sort | jq -R . | jq -cs .)
          echo "scenarios=$json" >> "$GITHUB_OUTPUT"
      - name: Stage artifacts
        run: |
          mkdir -p stage
          cp target/release/numen stage/
          cp zombienet/integration/integration-raw.json stage/
      - uses: actions/upload-artifact@v4
        with:
          name: zombienet-node
          path: stage

  zombienet:
    needs: build-zombienet
    strategy:
      fail-fast: false
      matrix:
        scenario: ${{ fromJSON(needs.build-zombienet.outputs.scenarios) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: zombienet-node
          path: stage
      - name: Restore artifacts
        run: |
          mkdir -p target/release
          cp stage/numen target/release/
          chmod +x target/release/numen
          cp stage/integration-raw.json zombienet/integration/
      - name: Install zombienet
        run: |
          curl -L -o /usr/local/bin/zombienet \
            https://github.com/paritytech/zombienet/releases/download/v1.3.138/zombienet-linux-x64
          chmod +x /usr/local/bin/zombienet
      - name: Install harness dependencies
        working-directory: zombienet/integration
        run: npm ci || npm install
      - name: Run scenario
        working-directory: zombienet/integration
        run: zombienet -p native test ${{ matrix.scenario }}
        timeout-minutes: 40

  build-binaries:
    needs: [check-version, test, zombienet]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset: numen-linux-x86_64
          - os: macos-latest
            asset: numen-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2

      - name: Rust compilation prerequisites (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: ./.github/actions/ubuntu-dependencies

      - name: Rust compilation prerequisites (macOS)
        if: matrix.os == 'macos-latest'
        uses: ./.github/actions/macos-dependencies

      - name: Build node
        run: cargo build --release
        timeout-minutes: 30

      - name: Bundle release archive
        run: |
          mkdir -p ${{ matrix.asset }}
          cp target/release/numen ${{ matrix.asset }}/
          cp testnet-raw.json ${{ matrix.asset }}/
          tar -czf ${{ matrix.asset }}.tar.gz ${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}.tar.gz
          path: ${{ matrix.asset }}.tar.gz

  publish:
    needs: [check-version, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*.tar.gz'
          merge-multiple: true

      - name: release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.check-version.outputs.version }}
          draft: true
          prerelease: ${{ contains(needs.check-version.outputs.version, '-') }}
          generate_release_notes: true
          files: artifacts/*

