name: CI

on:
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/free-disk-space
      - uses: ./.github/actions/ubuntu-dependencies
      - name: Run clippy
        run: SKIP_WASM_BUILD=1 cargo clippy --all-targets --locked --workspace --quiet
        timeout-minutes: 30

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/free-disk-space
      - uses: ./.github/actions/ubuntu-dependencies
      - name: Run tests
        run: SKIP_WASM_BUILD=1 cargo test --workspace --locked
        timeout-minutes: 30

  determinism:
    name: determinism (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: wasmtime
      - name: Native golden
        run: |
          cargo test -p obj-asteroid --test determinism --locked
          cargo test -p obj-asteroid --test spectral --locked golden
          cargo test -p poscan --test golden --locked
        timeout-minutes: 15
      - name: Add wasm target
        run: rustup target add wasm32-wasip1
      - name: Wasm golden (wasmtime)
        env:
          CARGO_TARGET_WASM32_WASIP1_RUNNER: "wasmtime run --"
        run: |
          cargo test -p obj-asteroid --test determinism --target wasm32-wasip1 --locked
          cargo test -p obj-asteroid --test spectral --target wasm32-wasip1 --locked golden
          cargo test -p poscan --test golden --target wasm32-wasip1 --locked
        timeout-minutes: 15
